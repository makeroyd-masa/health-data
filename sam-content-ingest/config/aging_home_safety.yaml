# Aging / caregiving / home safety seed (PRD §6.5).
# MedlinePlus topics ingest live; CDC STEADI is via HHS syndication (gated on availability).
medlineplus_topics:
  - Falls
  - Home Safety
  - Caregivers
  - Assistive Devices
  - Older Adult Health
  - Alzheimer's Caregivers
cdc:
  base_url: https://api.digitalmedia.hhs.gov/api/v2/resources
  max: 50
  # Evergreen STEADI/older-adult fall content isn't in HHS syndication — fetch the pages
  # directly (cdc.gov/falls). URLs verified 2026-07-05.
  direct_pages:
    - {id: falls-prevention, title: "Older Adult Fall Prevention", url: "https://www.cdc.gov/falls/prevention/index.html", audience: patient, keywords: [falls, older adults]}
    - {id: falls-about, title: "About Older Adult Falls", url: "https://www.cdc.gov/falls/about/index.html", audience: patient, keywords: [falls, older adults]}
  # Syndication queries kept as a fallback; catalog is thin for this use case.
  queries: []
