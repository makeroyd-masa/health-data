# Travel health readiness seed (PRD §6.6 + Travel Expansion §T5).
# Source-keyed sections; each ingested under use_case=travel_health.
#   cdc_prep         evergreen prep pages
#   cdc_destinations ~200 CDC country pages (periodic, geo=country)
#   cdc_yellowbook   consumer-relevant trip-type chapters (periodic, trip_types)
#   state_dept       advisories (volatile, from RSS) + country_info (periodic)
#   tsa_faa          medications/devices in transit (evergreen) + drug overlay

cdc_prep:
  direct_pages:
    - {id: pack-smart, title: "Pack Smart", url: "https://wwwnc.cdc.gov/travel/page/pack-smart", keywords: [travel, packing, travel health kit]}
    - {id: food-water-safety, title: "Food and Water Safety", url: "https://wwwnc.cdc.gov/travel/page/food-water-safety", keywords: [travel, food, water]}
    - {id: travelers-diarrhea, title: "Travelers' Diarrhea", url: "https://wwwnc.cdc.gov/travel/page/travelers-diarrhea", keywords: [travel, diarrhea]}
    - {id: avoid-bug-bites, title: "Avoid Bug Bites", url: "https://wwwnc.cdc.gov/travel/page/avoid-bug-bites", keywords: [travel, insects, bug bites]}
    - {id: health-care-abroad, title: "Getting Health Care During Travel", url: "https://wwwnc.cdc.gov/travel/page/getting-health-care-abroad", keywords: [travel, care abroad]}
    - {id: travel-vaccines, title: "Travel Vaccines", url: "https://wwwnc.cdc.gov/travel/page/travel-vaccines", keywords: [travel, vaccines]}

