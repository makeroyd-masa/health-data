# TSA/FAA medications & medical devices in transit (evergreen). direct_pages are scraped;
# drug_overlay blocks are hand-authored general guidance linked to DailyMed by rxcui
# (NO DailyMed body text is copied). URLs verified 2026-07-06.
tsa_faa:
  direct_pages:
    - {id: tsa-special-procedures, source: tsa, title: "TSA Special Procedures: Medications & Medical Devices", url: "https://www.tsa.gov/travel/special-procedures", trip_types: [chronic_condition], keywords: [travel, medications, security]}
    - {id: faa-portable-oxygen, source: faa, title: "FAA: Portable Oxygen Concentrators on Aircraft", url: "https://www.faa.gov/about/initiatives/cabin_safety/portable_oxygen", trip_types: [chronic_condition], keywords: [travel, oxygen, medical device]}
    - {id: faa-medical-device-batteries, source: faa, title: "FAA PackSafe: Batteries for Medical Devices", url: "https://www.faa.gov/hazmat/packsafe/lithium-batteries", trip_types: [chronic_condition], keywords: [travel, batteries, medical device]}
  drug_overlay:
    - id: insulin-in-transit
      source: tsa
      rxcui: "274783"
      title: "Traveling with Insulin"
      section: "Insulin & Diabetes Supplies in Transit"
      keywords: [travel, insulin, diabetes, medications]
      source_url: "https://www.tsa.gov/travel/special-procedures"
      body: >-
        Insulin and other injectable medicines are allowed through TSA security in carry-on
        bags in quantities greater than 3.4 ounces; declare them to the officer for separate
        screening. Keep insulin in your carry-on (not checked luggage) to avoid temperature
        extremes; gel/ice packs are permitted. Carry a copy of your prescription, and for
        international trips check the destination country's rules for insulin and syringes.
    - id: controlled-substance-in-transit
      source: tsa
      rxcui: "7804"
      title: "Traveling with Controlled-Substance Pain Medications"
      section: "Controlled Substances in Transit"
      keywords: [travel, controlled substance, opioid, medications]
      source_url: "https://www.tsa.gov/travel/special-procedures"
      body: >-
        Controlled-substance medicines such as opioid pain relievers may be carried in your
        bag, ideally in the original labeled pharmacy container. Bring only the amount needed
        for the trip plus a small margin and carry your prescription. Many countries restrict
        or ban common controlled substances or require advance permits — verify entry rules
        with the destination country's embassy before you travel.
    - id: adhd-stimulant-in-transit
      source: tsa
      rxcui: "6901"
      title: "Traveling with ADHD Stimulant Medications"
      section: "ADHD Stimulants in Transit"
      keywords: [travel, stimulant, adhd, controlled substance, medications]
      source_url: "https://www.tsa.gov/travel/special-procedures"
      body: >-
        ADHD stimulant medications such as methylphenidate are controlled substances that
        some countries restrict or prohibit. Keep them in original labeled containers with
        your prescription, bring only the trip's supply, and confirm entry rules with the
        destination country's embassy before travel.
    - id: benzodiazepine-in-transit
      source: tsa
      rxcui: "596"
      title: "Traveling with Anxiety/Sleep Medications (Benzodiazepines)"
      section: "Benzodiazepines in Transit"
      keywords: [travel, benzodiazepine, controlled substance, medications]
      source_url: "https://www.tsa.gov/travel/special-procedures"
      body: >-
        Benzodiazepines such as alprazolam are controlled substances subject to import limits
        in many countries. Keep them in original labeled containers, carry your prescription,
        and confirm the destination's rules and quantity limits before you travel.
